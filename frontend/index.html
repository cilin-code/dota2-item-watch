<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>饰品监测 - Steam 趋势监测</title>
<script src="/static/chart.umd.min.js"></script>
<style>
:root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2333;
    --line: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --weak: #6e7681;
    --accent: #f0883e;
    --accent2: #e3b341;
    --green: #3fb950;
    --amber: #d29922;
    --red: #f85149;
    --glow: rgba(240,136,62,.12);
    --content-gutter: clamp(16px, 5.55vw, 80px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    background-image:
        radial-gradient(ellipse at 20% 0%, rgba(240,136,62,.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(227,179,65,.03) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    letter-spacing: .01em;
}
header {
    border-bottom: 1px solid var(--line);
    background: rgba(22,27,34,.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
    width: 100%;
    margin: 0;
    border-radius: 0;
}
.header-inner {
    margin: 0 auto;
    padding: 16px 32px;
    display: flex; justify-content: space-between; align-items: center; gap: 24px;
    width: 100%;
}
.header-left { display: flex; flex: 0 0 auto; flex-direction: column; }.header-left h1 {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}
.subtitle { color: var(--muted); font-size: 11px; margin-top: 3px; }
.toolbar { display: flex; flex: 1 1 auto; gap: 0; align-items: center; justify-content: flex-end; min-width: 0; }
.toolbar-group { display: flex; gap: 6px; align-items: center; }

.search-wrap { position: relative; }
.search-wrap input {
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel-2); color: var(--text);
    height: 36px; padding: 0 12px 0 36px;
    font-size: 13px; width: 180px;
    transition: all .2s ease;
    outline: none;
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 12px var(--glow); width: 220px; }
.search-wrap input::placeholder { color: var(--weak); }
.search-wrap .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--weak); font-size: 14px; pointer-events: none;
}

.toolbar-divider { width: 1px; height: 24px; background: var(--line); margin: 0 10px; flex-shrink: 0; }
button {
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel-2); color: var(--text);
    height: 36px; padding: 0 16px; cursor: pointer;
    font-size: 13px; font-weight: 500;
    transition: all .2s ease;
}
button:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px var(--glow); }
#btnUpdate { background: #1e2a35; color: #f0883e; border-color: #f0883e; font-weight: 600; }
#btnUpdate:hover { background: #f0883e; color: #0d1117; border-color: #f0883e; }
#btnClearData { color: var(--red); border-color: rgba(248,81,73,.45); }
#btnClearData:hover { background: rgba(248,81,73,.12); color: var(--red); border-color: var(--red); }
button.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent; color: #0b0f19; font-weight: 700;
}
button.primary:hover { opacity: .9; box-shadow: 0 0 20px rgba(45,212,191,.3); }
button:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }
main { margin: 0 auto; padding: 0; }
.stats { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 4px; }
.stat {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 18px 20px;
    transition: border-color .2s;
}
.stat:hover { border-color: rgba(45,212,191,.3); }
.stat.clickable { cursor: pointer; }
.stat.clickable:hover { border-color: var(--accent); }
.stat.fav-active { border-color: var(--accent); box-shadow: 0 0 16px var(--glow); }
.stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
.stat .value {
    margin-top: 8px;
    font-family: "JetBrains Mono", "Cascadia Code", Consolas, "SF Mono", monospace;
    font-size: 24px; font-weight: 750;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}
.progress-wrap { display: none; margin-bottom: 4px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; }
.progress-wrap.active { display: block; }
.progress-label { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.progress { height: 6px; background: #0d1116; border-radius: 999px; overflow: hidden; }
.progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width .3s ease; }
.current-item { display: none; margin-top: 10px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; font-size: 13px; }
.current-item.active { display: flex; align-items: center; gap: 12px; }
.current-item img { width: 38px; height: 38px; border-radius: 8px; background: #0d1116; object-fit: cover; }
.current-item .ci-name { font-weight: 600; }
.current-item .ci-hash { color: var(--weak); font-size: 11px; margin-top: 2px; max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.current-item .ci-meta { color: var(--muted); margin-left: auto; font-size: 11px; }

.table-scroll { overflow-x: auto; }
table { width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 0; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; font-size: 13px; }
thead { background: linear-gradient(180deg, rgba(45,212,191,.06), transparent); }
th { padding: 10px 4px; text-align: center; vertical-align: middle; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; border-bottom: 1px solid var(--line); }
th:first-child { text-align: left; padding-left: 16px; }
td { padding: 8px 10px !important; border-top: 1px solid rgba(30,45,61,.6); vertical-align: middle; text-align: center; transition: background .15s; }
tr:hover td { background: rgba(45,212,191,.04); }
.name, .reason { text-align: left; }
.name-main { display: flex; align-items: center; gap: 10px; }
.name-actions { display: flex; flex-direction: column; gap: 5px; margin-left: auto; flex-shrink: 0; }
.name-actions .steam-link,
.name-actions .copy-btn {
    width: 26px; height: 24px; margin-left: 0; padding: 0;
    display: inline-grid; place-items: center;
    border: 1px solid rgba(139,148,158,.22);
    border-radius: 6px;
    background: rgba(13,17,23,.45);
    color: var(--weak);
    font-size: 13px; line-height: 1;
    text-decoration: none;
    transition: color .15s, border-color .15s, background .15s, transform .15s;
}
.name-actions .steam-link {
    color: #9fb7d7;
    border-color: rgba(88,166,255,.28);
    font-family: "JetBrains Mono", Consolas, monospace;
    font-size: 12px;
    font-weight: 800;
}
.name-actions .copy-btn { font-size: 12px; }
.name-actions .steam-link:hover,
.name-actions .copy-btn:hover {
    color: var(--accent);
    border-color: rgba(240,136,62,.45);
    background: rgba(240,136,62,.08);
    box-shadow: none;
    transform: translateY(-1px);
}
.name-icon { width: 56px; height: 56px; border-radius: 6px; object-fit: cover; background: #0d1116; flex-shrink: 0; }
.name-text { flex: 1; min-width: 0; }
.name { min-width: 120px; padding-left: 16px; padding-right: 8px; }
.name a { color: var(--text); text-decoration: none; font-weight: 600; transition: color .15s; }
.name a:hover { color: var(--accent); }
.hash { color: var(--weak); font-size: 11px; margin-top: 2px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.steam-link { display: inline-flex; align-items: center; gap: 3px; color: var(--muted); text-decoration: none; margin-left: 6px; font-size: 11px; transition: color .15s; }
.steam-link:hover { color: var(--accent); }
.copy-btn { display: inline-flex; align-items: center; color: var(--weak); margin-left: 4px; font-size: 12px; cursor: pointer; transition: color .15s; background: none; border: none; padding: 2px 4px; border-radius: 4px; line-height: 1; }
.copy-btn:hover { color: var(--accent); background: rgba(45,212,191,.08); }
.copy-btn.copied { color: var(--green); }
.price, .num { text-align: center !important; padding: 8px 8px !important; font-variant-numeric: tabular-nums; font-weight: 650; }
.score { display: inline-grid; place-items: center; min-width: 44px; height: 28px; border-radius: 6px; font-family: "JetBrains Mono", Consolas, "SF Mono", monospace; font-weight: 800; font-size: 13px; background: var(--panel-2); transition: all .2s; }
.score.s6 { color: #ff6b6b; border: 1px solid rgba(255,107,107,.5); box-shadow: 0 0 14px rgba(255,107,107,.22); font-weight: 900; }
.score.s5 { color: #f0883e; border: 1px solid rgba(240,136,62,.45); box-shadow: 0 0 10px rgba(240,136,62,.18); }
.score.s4 { color: #e3b341; border: 1px solid rgba(227,179,65,.4); box-shadow: 0 0 8px rgba(227,179,65,.12); }
.score.s3 { color: #34d399; border: 1px solid rgba(52,211,153,.35); box-shadow: 0 0 6px rgba(52,211,153,.08); }
.score.s2 { color: #38bdf8; border: 1px solid rgba(56,189,248,.35); }
.score.s1 { color: var(--muted); border: 1px solid var(--line); }
.change.up { color: #10b981; background: rgba(16,185,129,.12); padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.change.down { color: #ef4444; background: rgba(239,68,68,.12); padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.change.flat { color: var(--muted); padding: 2px 6px; }
.reason-inner { color: var(--muted); font-size: 12px; line-height: 1.5; max-height: 54px; overflow-y: auto; white-space: nowrap; overflow-x: hidden; text-overflow: ellipsis; padding: 0 4px; text-align: center; }
.reason-tags { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; justify-content: center; align-content: center; max-height: 58px; min-height: 30px; overflow-y: auto; width: 100%; margin: 0 auto; }
.reason-tag { display: inline-flex; align-items: center; max-width: 100%; padding: 2px 7px; border-radius: 5px; font-size: 11px; line-height: 1.4; border: 1px solid var(--line); background: rgba(139,148,158,.08); color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reason-tag.good { color: var(--green); border-color: rgba(63,185,80,.35); background: rgba(63,185,80,.09); }
.reason-tag.warn { color: var(--amber); border-color: rgba(210,153,34,.38); background: rgba(210,153,34,.09); }
.reason-tag.danger { color: var(--red); border-color: rgba(248,81,73,.38); background: rgba(248,81,73,.09); }
.reason-tag.info { color: #58a6ff; border-color: rgba(88,166,255,.35); background: rgba(88,166,255,.08); }
.reason-inner::-webkit-scrollbar { width: 3px; }
.reason-inner::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 3px; }
.time { color: var(--weak); font-size: 11px; white-space: nowrap; }
.action { white-space: nowrap; font-weight: 600; font-size: 12px; }
.btn-refresh { width: 32px; height: 32px; padding: 0; border-radius: 8px; font-size: 13px; color: #38bdf8; border-color: rgba(56,189,248,.25); background: transparent; vertical-align: middle; } .btn-refresh:hover { background: rgba(56,189,248,.1); border-color: #38bdf8; }
.btn-delete { width: 32px; height: 32px; padding: 0; color: var(--red); border-color: rgba(248,113,113,.2); background: transparent; border-radius: 8px; vertical-align: middle; }
.btn-delete:hover { background: rgba(248,113,113,.1); border-color: var(--red); color: var(--red); }
.btn-purchase { width: 32px; height: 32px; padding: 0; color: var(--green); border-color: rgba(52,211,153,.2); background: transparent; border-radius: 8px; font-weight: 700; vertical-align: middle; } .ops-sep { display: inline-block; width: 1px; height: 20px; background: var(--line); margin: 0 1px; vertical-align: middle; } .btn-purchase:hover { background: rgba(52,211,153,.1); border-color: var(--green); color: var(--green); }
.btn-alert { width: 32px; height: 32px; padding: 0; font-size: 13px; border-radius: 8px; vertical-align: middle; }
.btn-alert.has-alert { color: #f87171; border-color: #f87171; background: rgba(248,113,113,.12); }
.btn-alert.alert-set { color: #fbbf24; border-color: #fbbf24; background: rgba(251,191,36,.08); }
.alert-modal { max-width: 360px; }
.alert-modal h3 { font-size: 15px; margin-bottom: 12px; }
.alert-modal .current-price { color: var(--accent); font-size: 20px; font-weight: 700; margin-bottom: 12px; }
.alert-modal input { width: 100%; margin-bottom: 12px; }
.alert-modal .hint { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
tr.alert-triggered { background: rgba(248,113,113,.08) !important; border-left: 3px solid #f87171; }
tr.alert-triggered td:first-child { padding-left: 13px; }
.rank-S { color: #ff6b35; font-weight: 800; text-shadow: 0 0 8px rgba(255,107,53,.4); }
.rank-A { color: #f0883e; font-weight: 700; }
.rank-B { color: #3fb950; font-weight: 600; }
.rank-C { color: #58a6ff; font-weight: 500; }
.rank-D { color: #d29922; }
.rank-E { color: #8b949e; }
.confidence { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; }
.confidence.S { color: #ff6b35; border: 1px solid rgba(255,107,53,.3); background: rgba(255,107,53,.08); }
.confidence.A { color: #f0883e; border: 1px solid rgba(240,136,62,.3); background: rgba(240,136,62,.08); }
.confidence.B { color: #3fb950; border: 1px solid rgba(63,185,80,.3); background: rgba(63,185,80,.08); }
.confidence.C { color: #58a6ff; border: 1px solid rgba(88,166,255,.3); background: rgba(88,166,255,.08); }
.confidence.D { color: #d29922; border: 1px solid rgba(210,153,34,.3); background: rgba(210,153,34,.08); }
.confidence.E { color: #8b949e; border: 1px solid rgba(139,148,158,.3); background: rgba(139,148,158,.08); }.btn-fav { width: 32px; height: 32px; padding: 0; border-radius: 8px; font-size: 14px; vertical-align: middle; }

td.action, td.time { vertical-align: middle; text-align: center; }
td.reason { vertical-align: middle; text-align: center; padding-left: 8px !important; padding-right: 8px !important; }
td.ops-cell { white-space: nowrap; text-align: center; padding-left: 4px !important; padding-right: 4px !important; }
td.ops-cell .btn-refresh, td.ops-cell .btn-purchase, td.ops-cell .btn-fav, td.ops-cell .btn-alert, td.ops-cell .btn-delete { width: 28px; height: 30px; border-radius: 7px; }
td.name-cell { vertical-align: middle; }
th { vertical-align: middle; }
.btn-fav.active { color: #fbbf24; border-color: rgba(251,191,36,.4); }
.tags { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
.tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 600; color: var(--accent); background: rgba(45,212,191,.1); border: 1px solid rgba(45,212,191,.15); }
.metric { color: var(--weak); font-size: 10px; margin-top: 3px; }

.toolbar-label{font-size:10px;color:var(--weak);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;margin-right:2px}.delay-label{font-size:10px;color:var(--weak);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;white-space:nowrap}
.delay-select{height:32px;border:1px solid var(--line);border-radius:6px;background:var(--panel-2);color:var(--text);padding:0 8px;font-size:12px;cursor:pointer;outline:none;transition:border-color .2s}
.delay-select:focus{border-color:var(--accent)}

.btn-score{font-weight:700;font-size:12px;padding:0 12px}
.btn-score.all{color:var(--accent);border-color:var(--accent)}

.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
.modal-box h3{font-size:16px;margin-bottom:16px}
.modal-box input[type=text]{width:100%;border:1px solid var(--line);border-radius:8px;background:var(--panel-2);color:var(--text);height:40px;padding:0 14px;font-size:14px;outline:none;margin-bottom:12px;transition:border-color .2s}
.modal-box input[type=text]:focus,.modal-box input[type=number]:focus{border-color:var(--accent)}
.modal-box input[type=number]{width:100%;border:1px solid var(--line);border-radius:8px;background:var(--panel-2);color:var(--text);height:40px;padding:0 14px;font-size:14px;outline:none;transition:border-color .2s}
.modal-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.modal-item:hover{border-color:var(--accent);background:rgba(45,212,191,.04)}
.modal-item img{width:44px;height:44px;border-radius:8px;background:#0d1116;object-fit:cover}
.modal-item .mi-name{font-weight:600;font-size:13px}
.modal-item .mi-hash{color:var(--weak);font-size:11px}
.modal-item .mi-add{color:var(--accent);font-size:12px;font-weight:700;margin-left:auto;white-space:nowrap}
.modal-empty{text-align:center;color:var(--muted);padding:24px}
.purchase-modal{max-width:400px}.purchase-modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:8px}.purchase-modal input,.purchase-modal textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:var(--panel-2);color:var(--text);padding:8px 12px;font-size:13px;outline:none;margin-bottom:8px;transition:border-color .2s}.purchase-modal input:focus,.purchase-modal textarea:focus{border-color:var(--accent)}.purchase-modal textarea{resize:vertical;min-height:40px}.purchase-table{width:100%;font-size:12px}.purchase-table th{font-size:10px;padding:6px 8px}.purchase-table td{padding:6px 8px;font-size:12px}.purchase-table .pnl-up{color:var(--green)}.purchase-table .pnl-down{color:var(--red)}
.backtest-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px}.backtest-metric{border:1px solid var(--line);border-radius:8px;padding:10px;background:var(--panel-2)}.backtest-metric .k{font-size:10px;color:var(--weak);text-transform:uppercase}.backtest-metric .v{margin-top:4px;font-size:18px;font-weight:800;color:var(--text)}.backtest-samples{max-height:320px;overflow:auto}.backtest-samples table{font-size:12px;border-radius:8px}.backtest-samples th,.backtest-samples td{padding:6px 8px!important}.danger-note{color:var(--red);font-size:12px;line-height:1.6;margin-bottom:12px}
.empty{text-align:center;padding:60px;color:var(--muted)}
.loading{text-align:center;padding:80px;color:var(--muted);font-size:14px}
#content.loading{padding:16px var(--content-gutter) 80px var(--content-gutter)}
@keyframes pulse-alert { 0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,.3); } 50% { box-shadow: 0 0 8px 2px rgba(248,113,113,.15); } }
</style>
</head>
<body>
<header>
    <div class="header-inner">
        <div class="header-left">
            <h1>饰品监测</h1>
            <div class="subtitle">Dota 2 Steam 市场趋势分析</div>
        </div>
        <div class="toolbar" style="flex-wrap:wrap;gap:8px">
            <div class="toolbar-group">
                <span class="toolbar-label">饰品</span>
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchItems" placeholder="搜索已有饰品..." oninput="onSearchInput()">
                </div>
                <button onclick="openModal()">+ 添加</button>
                <input type="number" id="scoreInput" class="score-input" value="60" min="0" max="500" style="width:52px;height:32px;background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--text);text-align:center;font-size:12px" onchange="applyScoreFilter()" title="最低分筛选"> <button id="btnScoreFilter" class="btn-score" onclick="toggleScoreFilter()" title="显示全部">显示全部</button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-group">
                <span class="toolbar-label">记录</span>
                <button onclick="openPurchaseList()">📊 买入记录</button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-group">
                <span class="toolbar-label">间隔</span>
                <select class="delay-select" id="delaySelect">
                    <option value="1.0">1.0s</option>
                    <option value="1.5" selected>1.5s</option>
                    <option value="2.0">2.0s</option>
                    <option value="3.0">3.0s</option>
                </select>
            </div>
            <button id="btnUpdate" onclick="doUpdate()">更新 Steam 数据</button>
            <button onclick="openBacktest()">评分回测</button>
            <button id="btnClearData" onclick="clearAllData()">清空数据</button>
        </div>
    </div>
</header>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3>添加饰品</h3>
        <input type="text" id="searchInput" placeholder="搜索 Steam 市场饰品..." oninput="doSearch()">
        <div id="modalResults"></div>
    </div>
</div>

<div class="modal-overlay" id="alertOverlay">
    <div class="modal-box alert-modal">
        <h3>🔔 价格预警</h3>
        <div class="current-price" id="alertItemName">-</div>
        <div id="alertCurrentPrice" style="color:var(--muted);margin-bottom:8px;"></div>
        <div class="hint">当价格降至目标价以下时高亮提醒</div>
        <input type="number" id="alertTargetPrice" placeholder="目标价 (¥)" step="0.01" min="0.01">
        <input type="hidden" id="alertItemId">
        <div style="display:flex;gap:8px;">
            <button class="primary" onclick="saveAlert()" style="flex:1;">保存</button>
            <button onclick="removeAlert()" style="flex:1;" id="btnRemoveAlert">取消预警</button>
            <button onclick="closeAlertModal()" style="flex:1;">关闭</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="purchaseOverlay">
    <div class="modal-box purchase-modal">
        <h3>📝 买入记录</h3>
        <div class="current-price" id="purchaseItemName">-</div>
        <label>买入价 (¥)</label>
        <input type="number" id="purchasePrice" placeholder="买入单价" step="0.01" min="0.01">
        <label>数量</label>
        <input type="number" id="purchaseQty" value="1" min="1">
        <label>买入日期</label>
        <input type="date" id="purchaseDate">
        <label>备注 (可选)</label>
        <textarea id="purchaseNotes" placeholder="备注信息..."></textarea>
        <input type="hidden" id="purchaseItemId">
        <div style="display:flex;gap:8px;margin-top:4px;">
            <button class="primary" onclick="savePurchase()" style="flex:1;">保存</button>
            <button onclick="closePurchaseModal()" style="flex:1;">关闭</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="purchaseListOverlay">
    <div class="modal-box" style="max-width:800px">
        <h3>📊 买入记录</h3>
        <div id="purchaseListContent"></div>
        <div style="margin-top:12px;text-align:right">
            <button onclick="closePurchaseList()">关闭</button>
        </div>
    </div>
</div>

<main>
<div class="modal-overlay" id="backtestOverlay">
    <div class="modal-box" style="max-width:900px">
        <h3>评分回测</h3>
        <div id="backtestContent" class="modal-empty">加载中...</div>
        <div style="margin-top:12px;text-align:right"><button onclick="closeBacktest()">关闭</button></div>
    </div>
</div>

    <div style="width:100%;padding:12px var(--content-gutter) 0 var(--content-gutter);"><div class="stats" id="stats">
        <div class="stat"><div class="label">监控饰品</div><div class="value" id="s1">-</div></div>
        <div class="stat clickable" onclick="toggleFavFilter()" title="点击切换关注/全部"><div class="label">关注饰品</div><div class="value" id="s2">-</div></div>
        <div class="stat clickable" onclick="toggleAlertFilter()" title="点击只看已触发预警的饰品"><div class="label">预警</div><div class="value" id="s4">-</div></div>
        <div class="stat"><div class="label">最近更新</div><div class="value" id="s3">-</div></div>
    </div></div>
    <div style="width:100%;padding:0 var(--content-gutter);"><div class="progress-wrap" id="progressWrap">
        <div class="progress-label" id="progressLabel">准备更新...</div>
        <div class="current-item" id="currentItem"></div>
        <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    </div></div>
    <div id="content" class="loading">正在加载数据...</div>
</main>

<script>
var _favOnly = false;
var _allItems = [];
var _searchQuery = "";
var _toolbarSearchTimer = null;
var _favIds = new Set();
var _minScore = 60;
var _alertIds = new Set();
var _triggeredAlerts = new Set();
var _alertOnly = false;
var _dataLoaded = false;
var _itemsLoadToken = 0;

async function loadFavorites() {
    try {
        var r = await fetch("/api/items/favorites");
        var d = await r.json();
        _favIds = new Set(d.data || []);
        document.getElementById("s2").textContent = _favIds.size + " 件";
        updateFavButtons();
    } catch(e) {}
}

function updateFavButtons() {
    document.querySelectorAll(".btn-fav").forEach(function(btn) {
        var id = parseInt(btn.id.replace("fav-", ""));
        if (_favIds.has(id)) { btn.textContent = "★"; btn.classList.add("active"); }
        else { btn.textContent = "☆"; btn.classList.remove("active"); }
    });
}

function toggleAlertFilter() {
    _alertOnly = !_alertOnly;
    var card = document.getElementById("s4").parentElement;
    if (_alertOnly) { card.classList.add("fav-active"); _favOnly = false; document.getElementById("s2").parentElement.classList.remove("fav-active"); }
    else card.classList.remove("fav-active");
    renderTable();
}

function toggleFavFilter() {
    _favOnly = !_favOnly;
    var card = document.getElementById("s2").parentElement;
    if (_favOnly) card.classList.add("fav-active"); else card.classList.remove("fav-active");
    renderTable();
}

function toggleScoreFilter() {
    var inp = document.getElementById("scoreInput");
    if (_minScore === 0) {
        _minScore = parseInt(inp.value) || 60;
        document.getElementById("btnScoreFilter").textContent = "显示全部";
        document.getElementById("btnScoreFilter").classList.remove("all");
    } else {
        inp.value = _minScore;
        _minScore = 0;
        document.getElementById("btnScoreFilter").textContent = "全部";
        document.getElementById("btnScoreFilter").classList.add("all");
    }
    renderTable();
}

function onSearchInput() {
    clearTimeout(_toolbarSearchTimer);
    _toolbarSearchTimer = setTimeout(function() {
        _searchQuery = document.getElementById("searchItems").value.trim();
        renderTable();
    }, 200);
}

function applyScoreFilter() {
    var inp = document.getElementById("scoreInput");
    var val = parseInt(inp.value) || 0;
    if (val <= 0) { inp.value = 60; _minScore = 60; }
    else _minScore = val;
    if (_minScore > 0) {
        document.getElementById("btnScoreFilter").textContent = "显示全部";
        document.getElementById("btnScoreFilter").classList.remove("all");
    }
    loadData();
}

async function loadData() {
    var token = ++_itemsLoadToken;
    var firstPage = 50;
    var nextOffset = 0;
    try {
        var r = await fetch("/api/items?min_score=0&limit=" + firstPage + "&offset=0");
        var d = await r.json();
        if (token !== _itemsLoadToken) return;
        _allItems = d.data || [];
        nextOffset = _allItems.length;
        _dataLoaded = true;
        await loadFavorites();
        renderTable();
        loadAlertStates();
        loadRemainingItems(token, nextOffset, d.total || _allItems.length, firstPage);
    } catch {
        document.getElementById("content").innerHTML = '<div class="empty">加载失败</div>';
    }
}

function mergeItems(items) {
    var existing = new Set(_allItems.map(function(it) { return it.id; }));
    (items || []).forEach(function(item) {
        if (!existing.has(item.id)) {
            _allItems.push(item);
            existing.add(item.id);
        }
    });
}

async function loadRemainingItems(token, offset, total, pageSize) {
    while (token === _itemsLoadToken && offset < total) {
        try {
            var r = await fetch("/api/items?min_score=0&limit=" + pageSize + "&offset=" + offset);
            var d = await r.json();
            if (token !== _itemsLoadToken) return;
            var batch = d.data || [];
            if (!batch.length) return;
            mergeItems(batch);
            offset += batch.length;
            total = d.total || total;
            renderTable();
        } catch(e) {
            return;
        }
    }
}

async function loadStats() {
    try {
        var r = await fetch("/api/stats");
        var d = await r.json();
        var s = d.data || {};
        document.getElementById("s1").textContent = (s.total_items || 0) + " 件";
        document.getElementById("s3").textContent = fmtTime(s.latest_update);
        document.getElementById("s4").textContent = _triggeredAlerts.size + " 件";
    } catch {}
}

async function openPurchaseModal(id) {
    var item = _allItems.find(function(it) { return it.id === id; });
    var name = item ? (item.name_cn || item.market_hash_name) : "";
    var price = item ? item.current_price : null;
    document.getElementById("purchaseItemId").value = id;
    document.getElementById("purchaseItemName").textContent = name + " (当前 " + priceText(price) + ")";
    document.getElementById("purchasePrice").value = price == null ? "" : price;
    document.getElementById("purchaseQty").value = "1";
    document.getElementById("purchaseDate").value = new Date().toISOString().substring(0, 10);
    document.getElementById("purchaseNotes").value = "";
    document.getElementById("purchaseOverlay").classList.add("active");
}
function closePurchaseModal() {
    document.getElementById("purchaseOverlay").classList.remove("active");
}
document.addEventListener("click", function(e) {
    if (e.target.id === "purchaseOverlay") closePurchaseModal();
});
async function savePurchase() {
    var id = parseInt(document.getElementById("purchaseItemId").value);
    var price = parseFloat(document.getElementById("purchasePrice").value);
    var qty = parseInt(document.getElementById("purchaseQty").value) || 1;
    var date = document.getElementById("purchaseDate").value;
    var notes = document.getElementById("purchaseNotes").value;
    if (!price || price <= 0) return;
    try {
        var r = await fetch("/api/items/" + id + "/purchase", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({buy_price: price, quantity: qty, buy_date: date, notes: notes})
        });
        var d = await r.json();
        if (d.code === 0) closePurchaseModal();
    } catch(e) {}
}
async function openPurchaseList() {
    document.getElementById("purchaseListOverlay").classList.add("active");
    document.getElementById("purchaseListContent").innerHTML = '<div class="modal-empty">加载中...</div>';
    try {
        var r = await fetch("/api/purchases");
        var d = await r.json();
        var records = d.data || [];
        if (!records.length) {
            document.getElementById("purchaseListContent").innerHTML = '<div class="modal-empty">暂无买入记录</div>';
            return;
        }
        var h = '<div class="table-scroll"><table class="purchase-table"><thead><tr><th>饰品</th><th>买入价</th><th>数量</th><th>日期</th><th>现价</th><th>盈亏</th><th>备注</th><th>操作</th></tr></thead><tbody>';
        records.forEach(function(r) {
            var pnlCls = r.pnl > 0 ? "pnl-up" : r.pnl < 0 ? "pnl-down" : "";
            h += '<tr><td>' + esc(r.name_cn || r.market_hash_name) + '</td>';
            h += '<td>¥' + num(r.buy_price) + '</td>';
            h += '<td>' + r.quantity + '</td>';
            h += '<td>' + (r.buy_date || "-") + '</td>';
            h += '<td>' + priceText(r.current_price) + (r.net_sell_price == null ? '' : '<div class="hash">税后 ' + priceText(r.net_sell_price) + '</div>') + '</td>';
            h += '<td class="' + pnlCls + '">' + (r.pnl > 0 ? "+" : "") + num(r.pnl) + ' (' + (r.pnl_pct > 0 ? "+" : "") + num(r.pnl_pct) + '%)</td>';
            h += '<td>' + esc(r.notes || "-") + '</td>';
            h += '<td><button class="btn-delete" onclick="deletePurchase(' + r.id + ', this)" style="font-size:10px;width:24px;height:24px;padding:0">✕</button></td></tr>';
        });
        h += '</tbody></table></div>';
        document.getElementById("purchaseListContent").innerHTML = h;
    } catch(e) {
        document.getElementById("purchaseListContent").innerHTML = '<div class="modal-empty">加载失败</div>';
    }
}
function closePurchaseList() {
    document.getElementById("purchaseListOverlay").classList.remove("active");
}
document.addEventListener("click", function(e) {
    if (e.target.id === "purchaseListOverlay") closePurchaseList();
});
async function deletePurchase(id, btn) {
    if (!confirm("删除这条买入记录？")) return;
    try {
        var r = await fetch("/api/purchases/" + id, {method: "DELETE"});
        if (r.ok) { btn.parentElement.parentElement.remove(); }
    } catch(e) {}
}

async function loadAllAlerts() {
    try {
        var r = await fetch("/api/alerts/all");
        var d = await r.json();
        _alertIds = new Set((d.data || []).map(function(a) { return a.item_id || a; }));
    } catch(e) { _alertIds = new Set(); }
}

async function loadAlertTriggers() {
    try {
        var r = await fetch("/api/alerts/triggered");
        var d = await r.json();
        _triggeredAlerts = new Set((d.data || []).map(function(a) { return a.item_id; }));
    } catch(e) { _triggeredAlerts = new Set(); }
}

async function loadAlertStates() {
    await loadAlertTriggers();
    await loadAllAlerts();
    document.querySelectorAll(".btn-alert").forEach(function(btn) {
        var id = parseInt(btn.id.replace("alert-btn-", ""));
        btn.classList.remove("has-alert", "alert-set");
        if (_triggeredAlerts.has(id)) { btn.classList.add("has-alert"); }
        else if (_alertIds.has(id)) { btn.classList.add("alert-set"); }
    });
    document.querySelectorAll("tbody tr").forEach(function(row) {
        var btn = row.querySelector(".btn-alert");
        if (btn) {
            var id = parseInt(btn.id.replace("alert-btn-", ""));
            if (_triggeredAlerts.has(id)) row.classList.add("alert-triggered");
            else row.classList.remove("alert-triggered");
        }
    });
    document.getElementById("s4").textContent = _triggeredAlerts.size + " 件";
}

async function openAlertModal(id) {
    var item = _allItems.find(function(it) { return it.id === id; });
    var name = item ? (item.name_cn || item.market_hash_name) : "";
    var price = item ? item.current_price : null;
    document.getElementById("alertItemId").value = id;
    document.getElementById("alertItemName").textContent = name;
    document.getElementById("alertCurrentPrice").textContent = "当前价: " + priceText(price);
    document.getElementById("alertTargetPrice").value = "";
    document.getElementById("btnRemoveAlert").style.display = "none";
    try {
        var r = await fetch("/api/items/" + id + "/alert");
        var d = await r.json();
        if (d.code === 0 && d.data) {
            document.getElementById("alertTargetPrice").value = d.data.target_price;
            document.getElementById("btnRemoveAlert").style.display = "";
        }
    } catch(e) {}
    document.getElementById("alertOverlay").classList.add("active");
}

function closeAlertModal() {
    document.getElementById("alertOverlay").classList.remove("active");
}

document.addEventListener("click", function(e) {
    if (e.target.id === "alertOverlay") closeAlertModal();
});

async function saveAlert() {
    var id = parseInt(document.getElementById("alertItemId").value);
    var price = parseFloat(document.getElementById("alertTargetPrice").value);
    if (!price || price <= 0) return;
    try {
        var r = await fetch("/api/items/" + id + "/alert", {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({target_price: price})
        });
        var d = await r.json();
        if (d.code === 0) { closeAlertModal(); loadAlertStates(); }
    } catch(e) {}
}

async function removeAlert() {
    var id = parseInt(document.getElementById("alertItemId").value);
    try {
        var r = await fetch("/api/items/" + id + "/alert", {method: "DELETE"});
        if (r.ok) { closeAlertModal(); loadAlertStates(); }
    } catch(e) {}
}

async function toggleFav(id) {
    try {
        var r = await fetch("/api/items/" + id + "/favorite", {method: "PUT"});
        var d = await r.json();
        if (d.code === 0 && d.data) {
            if (d.data.favorite) _favIds.add(id); else _favIds.delete(id);
            updateFavButtons();
            document.getElementById("s2").textContent = _favIds.size + " 件";
            if (_favOnly) renderTable();
        }
    } catch(e) {}
}

function openModal() {
    document.getElementById("modalOverlay").classList.add("active");
    document.getElementById("searchInput").value = "";
    document.getElementById("modalResults").innerHTML = '<div class="modal-empty">输入关键词搜索 Steam 市场饰品</div>';
    setTimeout(function(){ document.getElementById("searchInput").focus(); }, 100);
}

function closeModal() {
    document.getElementById("modalOverlay").classList.remove("active");
}

document.getElementById("modalOverlay").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
});

var _searchTimer = null;
async function doSearch() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(async function() {
        var q = document.getElementById("searchInput").value.trim();
        if (!q) {
            document.getElementById("modalResults").innerHTML = '<div class="modal-empty">输入关键词搜索 Steam 市场饰品</div>';
            return;
        }
        document.getElementById("modalResults").innerHTML = '<div class="modal-empty">搜索中...</div>';
        try {
            var r = await fetch("/api/items/search?q=" + encodeURIComponent(q) + "&limit=15");
            var d = await r.json();
            var items = d.data || [];
            if (!items.length) {
                document.getElementById("modalResults").innerHTML = '<div class="modal-empty">未找到匹配的饰品</div>';
                return;
            }
            var h = "";
            items.forEach(function(it) {
                var hash = esc((it.market_hash_name||""));
                var nc = esc((it.name_cn||""));
                var icon = esc((it.icon_url||""));
                var rarity = esc((it.rarity||""));
                h += '<div class="modal-item" data-hash="' + hash + '" data-name="' + nc + '" data-icon="' + icon + '" data-rarity="' + rarity + '" data-action="add">';
                if (it.icon_url) h += '<img src="' + icon + '" alt="">';
                h += '<div><div class="mi-name">' + (nc || hash) + '</div><div class="mi-hash">' + hash + '</div></div>';
                h += '<span class="mi-add">+ 添加</span></div>';
            });
            document.getElementById("modalResults").innerHTML = h;
        } catch(e) {
            document.getElementById("modalResults").innerHTML = '<div class="modal-empty">搜索失败，请重试</div>';
        }
    }, 400);
}

document.getElementById("modalResults").addEventListener("click", async function(e) {
    var el = e.target.closest("[data-action='add']");
    if (!el) return;
    var hash = el.getAttribute("data-hash");
    var name = el.getAttribute("data-name");
    var icon = el.getAttribute("data-icon");
    var rarity = el.getAttribute("data-rarity");
    el.style.opacity = "0.5";
    el.removeAttribute("data-action");
    try {
        var r = await fetch("/api/items", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({market_hash_name: hash, name_cn: name, icon_url: icon, rarity: rarity})
        });
        var d = await r.json();
        if (d.code === 0) {
            el.querySelector(".mi-add").textContent = "已添加";
            loadData(); loadStats();
            _minScore = 0;
            var b = document.getElementById("btnScoreFilter");
            if (b) { b.textContent = "显示全部"; b.classList.add("all"); }
            setTimeout(closeModal, 800);
        } else {
            el.querySelector(".mi-add").textContent = (d.message || "已存在");
            el.style.opacity = "1";
            el.setAttribute("data-action", "add");
        }
    } catch(e) {
        el.querySelector(".mi-add").textContent = "添加失败";
        el.style.opacity = "1";
        el.setAttribute("data-action", "add");
    }
});

async function deleteItem(id) {
    if (!confirm("确定要删除该饰品及所有历史价格数据吗？")) return;
    try {
        var r = await fetch("/api/items/" + id, {method: "DELETE"});
        var d = await r.json();
        if (d.code === 0) { loadData(); loadStats(); }
    } catch(e) { alert("删除失败"); }
}

function renderTable() {
    var items = getVisibleItems();
    if (!items || !items.length) {
        var msg = _allItems.length === 0 ? '暂无饰品数据，请先点击"更新 Steam 数据"' : "没有匹配的饰品";
        document.getElementById("content").innerHTML = '<div class="empty">' + msg + '</div>';
        return;
    }
    var html = '<div class="table-scroll"><table><colgroup>' +
        '<col style="width:17%"><col style="width:6%"><col style="width:4%"><col style="width:4%"><col style="width:4%"><col style="width:4%"><col style="width:4.5%"><col style="width:4%"><col style="width:4%"><col style="width:5%"><col style="width:5.5%"><col style="width:20%"><col style="width:6%"><col style="width:12%">' +
        '</colgroup><thead><tr>' +
        '<th>名称</th><th>现价</th><th>3日</th><th>7日</th><th>15日</th><th>30日</th><th>成交量</th><th>评分</th><th>等级</th><th>置信度</th><th>参考价</th><th>原因</th><th>更新时间</th><th>操作</th>' +
        '</tr></thead><tbody>';
    items.forEach(function(item) {
        var a = item.analysis || {};
        var tags = [];
        if (a.volume_class === 'THIN') tags.push('冷门');
        if (a.low_sample_risk) tags.push('样本少');
        if (a.low_volume_risk) tags.push('量少风险');
        var conf = a.confidence || '-';
        var confCls = conf === 'HIGH' ? 'good' : conf === 'MEDIUM' ? 'mid' : 'low';
        html += '<tr><td class="name"><div class="name-main">' + (item.icon_url ? '<img class="name-icon" src="' + esc(item.icon_url) + '" alt="">' : '') + '<div class="name-text"><a href="/item/' + item.id + '">' + esc(item.name_cn || item.market_hash_name) + '</a><div class="hash">' + esc(item.market_hash_name) + '</div>' + (tags.length ? '<div class="tags">' + tags.map(function(t){return '<span class="tag">' + esc(t) + '</span>';}).join('') + '</div>' : '') + '</div><div class="name-actions"><a href="' + steamLink(item.market_hash_name) + '" target="_blank" class="steam-link" title="在 Steam 查看" aria-label="在 Steam 查看">S</a><button class="copy-btn" onclick="copyName(this)" title="复制名称" aria-label="复制名称">⧉</button></div></div></td>'; 
        html += '<td class="price">' + priceText(item.current_price) + '</td>'; 
        html += '<td class="num">' + trendChange(item.trend && item.trend["3"]) + '</td>';
        html += '<td class="num">' + trendChange(item.trend && item.trend["7"]) + '</td>';
        html += '<td class="num">' + trendChange(item.trend && item.trend["15"]) + '</td>';
        html += '<td class="num">' + trendChange(item.trend && item.trend["30"]) + '</td>';
        html += '<td class="num">' + (item.volume_24h || 0) + '</td>';
        html += '<td class="num">' + score(item.score) + '</td>';
        var recText = item.recommendation || '-';
        var rank = recText.charAt(0);
        var rankClass = (rank >= 'A' && rank <= 'S') ? 'rank-' + rank : '';
        html += '<td class="action ' + rankClass + '">' + esc(recText) + '</td>';
        html += '<td class="action"><span class="confidence ' + confCls + ' ' + rankClass + '">' + esc(conf) + '</span></td>';
        html += '<td class="price">' + (a.smart_price != null ? '¥' + num(a.smart_price) : '-') + '</td>';
        html += '<td class="reason">' + reasonHtml(item) + '</td>';
        html += '<td class="time">' + fmtTime(item.updated_at) + '</td>';
        html += '<td class="action ops-cell"><span class="ops-sep"></span><button class="btn-refresh" onclick="refreshOne(' + item.id + ', this)" title="刷新数据">↻</button><span class="ops-sep"></span><button class="btn-purchase" onclick="openPurchaseModal(' + item.id + ')" title="记录买入">$</button><span class="ops-sep"></span><button class="btn-fav" id="fav-' + item.id + '" onclick="toggleFav(' + item.id + ')" title="关注">☆</button><span class="ops-sep"></span><button class="btn-alert" id="alert-btn-' + item.id + '" onclick="openAlertModal(' + item.id + ')" title="价格预警">!</button><span class="ops-sep"></span><button class="btn-delete" onclick="deleteItem(' + item.id + ')" title="删除">✕</button></td></tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById("content").innerHTML = html;
    updateFavButtons();
    setTimeout(loadAlertStates, 100);
}

function trendChange(t) {
    if (!t || t.change_pct == null) return '-';
    var v = Number(t.change_pct).toFixed(1);
    var cls = v > 0 ? 'change up' : v < 0 ? 'change down' : 'change flat';
    return '<span class="' + cls + '">' + (v > 0 ? '+' : '') + v + '%</span>';
}

function score(v) {
    if (v == null) return '-';
    var cls = v >= 120 ? 's6' : v >= 100 ? 's5' : v >= 85 ? 's4' : v >= 70 ? 's3' : v >= 55 ? 's2' : 's1';
    return '<span class="score ' + cls + '">' + v + '</span>';
}

function steamLink(market_hash_name) {
    return "https://steamcommunity.com/market/listings/570/" + encodeURIComponent(market_hash_name);
}

function num(v) { return v == null ? "-" : Number(v).toFixed(2); }
function priceText(v) { return v == null ? "未获取" : "¥" + num(v); }

function reasonHtml(item) {
    var details = item && item.analysis && item.analysis.reason_details;
    if (details && details.length) {
        return '<div class="reason-tags">' + details.map(function(d) {
            var level = ['good', 'warn', 'danger', 'info'].indexOf(d.level) >= 0 ? d.level : 'info';
            return '<span class="reason-tag ' + level + '" title="' + esc(d.text || '') + '">' + esc(d.text || '') + '</span>'; 
        }).join('') + '</div>'; 
    }
    return '<div class="reason-inner">' + (item && item.reason ? esc(item.reason) : '-') + '</div>'; 
}

async function clearAllData() {
    if (localStorage.getItem('update_running')) { alert('更新任务运行中，请完成后再清空数据'); return; }
    if (!confirm('确定清空全部饰品、价格、预警、买入记录和抓取日志吗？此操作不可恢复。')) return;
    var text = prompt('请输入 CLEAR 确认清空全部数据');
    if (text !== 'CLEAR') return;
    try {
        var r = await fetch('/api/admin/clear-data', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({confirm:true})});
        var d = await r.json();
        if (d.code === 0) {
            _allItems = [];
            _favIds = new Set();
            _alertIds = new Set();
            _triggeredAlerts = new Set();
            localStorage.removeItem('update_running');
            renderTable();
            loadStats();
            alert('已清空全部数据');
        } else {
            alert(d.message || '清空失败');
        }
    } catch (e) {
        alert('清空失败: ' + String(e));
    }
}

async function openBacktest() {
    var overlay = document.getElementById('backtestOverlay');
    var box = document.getElementById('backtestContent');
    overlay.classList.add('active');
    box.className = 'modal-empty';
    box.innerHTML = '回测中...';
    try {
        var r = await fetch('/api/backtest?horizon_days=7&min_score=75&days=360');
        var d = await r.json();
        if (d.code !== 0) { box.innerHTML = esc(d.message || '回测失败'); return; }
        renderBacktest(d.data || {});
    } catch (e) {
        box.innerHTML = '回测失败: ' + esc(String(e));
    }
}

function closeBacktest() {
    document.getElementById('backtestOverlay').classList.remove('active');
}

function renderBacktest(data) {
    var box = document.getElementById('backtestContent');
    var samples = data.samples || [];
    var h = '<div class="backtest-grid">';
    h += backtestMetric('信号数', data.signals || 0);
    h += backtestMetric('胜率', (data.win_rate || 0).toFixed ? Number(data.win_rate).toFixed(1) + '%' : (data.win_rate || 0) + '%');
    h += backtestMetric('平均收益', (data.avg_return_pct || 0) + '%');
    h += backtestMetric('最好/最差', (data.best_return_pct || 0) + '% / ' + (data.worst_return_pct || 0) + '%');
    h += '</div>'; 
    h += '<div class="danger-note">规则：历史上评分达到 75 分时模拟买入，观察 7 天后的成交价收益。当前数据库为空或样本不足时，信号数会是 0。</div>'; 
    if (!samples.length) {
        h += '<div class="modal-empty">暂无可回测样本</div>'; 
    } else {
        h += '<div class="backtest-samples"><table><thead><tr><th>饰品</th><th>时间</th><th>评分</th><th>买入价</th><th>未来价</th><th>收益</th></tr></thead><tbody>'; 
        samples.slice().reverse().forEach(function(s) {
            var cls = Number(s.return_pct) >= 0 ? 'change up' : 'change down';
            h += '<tr><td class="name">' + esc(s.name_cn || s.market_hash_name || '') + '</td><td>' + esc(s.at || '') + '</td><td>' + score(s.score || 0) + '</td><td>¥' + num(s.start_price) + '</td><td>¥' + num(s.future_price) + '</td><td><span class="' + cls + '">' + Number(s.return_pct || 0).toFixed(2) + '%</span></td></tr>'; 
        });
        h += '</tbody></table></div>'; 
    }
    box.className = '';
    box.innerHTML = h;
}

function backtestMetric(k, v) {
    return '<div class="backtest-metric"><div class="k">' + esc(k) + '</div><div class="v">' + esc(String(v)) + '</div></div>'; 
}

function esc(s) {
    var d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
}

function fmtTime(t) {
    if (!t) return "-";
    var d = new Date(String(t).replace(" ", "T") + "Z");
    var diff = Date.now() - d.getTime();
    if (Number.isNaN(diff)) return t;
    if (diff < 60000) return "刚刚";
    if (diff < 3600000) return Math.floor(diff / 60000) + "分前";
    if (diff < 86400000) return Math.floor(diff / 3600000) + "时前";
    return String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0") + " " + String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

function copyName(btn) {
    // Find the name link in the sibling .name-text div
    var nameMain = btn.closest(".name-main");
    var nameLink = nameMain ? nameMain.querySelector(".name-text a") : null;
    var text = nameLink ? nameLink.textContent.trim() : "";
    navigator.clipboard.writeText(text).then(function() {
        var orig = btn.textContent;
        btn.textContent = "✓";
        setTimeout(function() { btn.textContent = orig; }, 1000);
    }).catch(function() {});
    window.open("https://smis.club/search?q=" + encodeURIComponent(text), "_blank");
}

async function doUpdate() {
    var btn = document.getElementById("btnUpdate");
    var wrap = document.getElementById("progressWrap");
    var label = document.getElementById("progressLabel");
    var fill = document.getElementById("progressFill");
    var cur = document.getElementById("currentItem");
    btn.disabled = true; btn.textContent = "更新中...";
    localStorage.setItem("update_running", "1");
    wrap.classList.add("active");
    
    label.textContent = "正在获取 Steam 数据...";
    fill.style.width = "0%";
    if (!_dataLoaded) {
        label.textContent = "正在加载当前显示列表...";
        await loadData();
    }
    var delay = parseFloat(document.getElementById("delaySelect").value) || 1.5;
    var visibleIds = getVisibleItems().map(function(item) { return item.id; }).filter(Boolean);
    if (!visibleIds.length) {
        label.textContent = "当前没有可更新的饰品";
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        wrap.classList.remove("active");
        btn.disabled = false;
        btn.textContent = "更新 Steam 数据";
        return;
    }
    localStorage.setItem("update_item_ids", visibleIds.join(","));
    var es = new EventSource("/api/fetch?delay=" + delay + "&discover=true&min_score=0&item_ids=" + encodeURIComponent(visibleIds.join(",")));
    es.addEventListener("phase", function(e) { handleSSE(JSON.parse(e.data)); });
    es.addEventListener("item", function(e) { handleSSE(JSON.parse(e.data)); });
    es.addEventListener("progress", function(e) { handleSSE(JSON.parse(e.data)); });
    es.addEventListener("done", function(e) {
        handleSSE(JSON.parse(e.data));
        es.close();
        setTimeout(function() { wrap.classList.remove("active"); btn.disabled = false; btn.textContent = "更新 Steam 数据"; }, 1200);
        setTimeout(function() { loadData(); loadStats(); }, 500);
    });
    es.addEventListener("error", function(e) {
        if (e.data) handleSSE(JSON.parse(e.data));
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        es.close();
        setTimeout(function() { wrap.classList.remove("active"); btn.disabled = false; btn.textContent = "更新 Steam 数据"; }, 1200);
        setTimeout(function() { loadData(); loadStats(); }, 500);
    });
    es.addEventListener("ratelimited", function(e) {
        handleSSE(JSON.parse(e.data));
        es.close();
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        setTimeout(function() { wrap.classList.remove("active"); btn.disabled = false; btn.textContent = "更新 Steam 数据"; }, 1200);
        setTimeout(function() { loadData(); loadStats(); }, 500);
    });
    es.addEventListener("ping", function(e) {});
    es.onerror = function() {
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        es.close();
        setTimeout(function() { wrap.classList.remove("active"); btn.disabled = false; btn.textContent = "更新 Steam 数据"; }, 1200);
        setTimeout(function() { loadData(); loadStats(); }, 500);
    };
}

function handleSSE(data) {
    var label = document.getElementById("progressLabel");
    var fill = document.getElementById("progressFill");
    var cur = document.getElementById("currentItem");
    if (data.type === "phase") {
        if (data.status === "discover") { label.textContent = "正在发现新饰品..."; }
        else if (data.status === "prices") { label.textContent = "正在获取价格，共 " + (data.total || 0) + " 件..."; }
        else { label.textContent = data.message || data.status || "处理中..."; }
    } else if (data.type === "item") {
        cur.classList.add("active");
        cur.innerHTML = (data.icon_url ? '<img src="' + data.icon_url + '" alt="">' : '') + '<div><div class="ci-name">' + esc(data.name_cn || data.market_hash_name || "") + '</div><div class="ci-hash">' + esc(data.market_hash_name || "") + '</div></div><div class="ci-meta">' + esc(data.status || "") + '</div>';
        // Update time in table for this item
        if (data.item_id) {
            var now = new Date();
            var ts = String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0") + " " + String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
            var rows = document.querySelectorAll("tbody tr");
            for (var ri = 0; ri < rows.length; ri++) {
                var row = rows[ri];
                var favBtn = row.querySelector(".btn-fav");
                if (favBtn && parseInt(favBtn.id.replace("fav-", "")) === data.item_id) {
                    var timeCell = row.querySelector(".time");
                    if (timeCell) timeCell.textContent = ts;
                    break;
                }
            }
            // Also update _allItems
            for (var ai = 0; ai < _allItems.length; ai++) {
                if (_allItems[ai].id === data.item_id) {
                    _allItems[ai].updated_at = now.toISOString();
                    break;
                }
            }
        }
    } else if (data.type === "progress") {
        fill.style.width = (data.total > 0 ? Math.round(data.current / data.total * 100) : 0) + "%";
        label.textContent = "获取中 " + (data.current || 0) + "/" + (data.total || 0) + " (已更新: " + (data.updated || 0) + ")";
    } else if (data.type === "done") {
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        cur.classList.remove("active");
        label.textContent = "更新完成! 现价: " + (data.results.steam || 0) + " 件, 成交点: " + (data.results.history || 0) + " 条, 热门命中: " + (data.results.discovered || 0) + " 件, 冷却跳过: " + (data.results.skipped || 0) + " 件";
        fill.style.width = "100%";
    } else if (data.type === "ratelimited") {
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        label.textContent = data.message || "Steam 限流中，已停止更新。";
    } else if (data.type === "error") {
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        label.textContent = "错误: " + (data.message || "");
    }
}

function getVisibleItems() {
    var items = _allItems.slice();
    if (_minScore > 0) items = items.filter(function(it) { return it.score >= _minScore; });
    if (_alertOnly) items = items.filter(function(it) { return _triggeredAlerts.has(it.id); });
    if (_favOnly) items = items.filter(function(it) { return _favIds.has(it.id); });
    if (_searchQuery) {
        var ql = _searchQuery.toLowerCase();
        items = items.filter(function(it) {
            return (it.name_cn && it.name_cn.toLowerCase().indexOf(ql) >= 0) ||
                   (it.market_hash_name && it.market_hash_name.toLowerCase().indexOf(ql) >= 0);
        });
    }
    return items;
}

async function refreshOne(id, btn) {
    btn.disabled = true; btn.textContent = "...";
    try {
        var r = await fetch("/api/fetch/" + id);
        var d = await r.json();
        if (d.code === 0) {
            await loadData();
            loadStats();
        } else {
            alert(d.message || "刷新失败");
        }
    } catch(e) {
        alert("刷新失败: " + String(e));
    }
    btn.disabled = false; btn.textContent = "↻";
}



// Check if update was in progress - reconnect SSE
(async function() {
    if (!localStorage.getItem("update_running")) { loadData(); loadStats(); return; }
    var savedItemIds = localStorage.getItem("update_item_ids") || "";
    if (!savedItemIds) {
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        loadData(); loadStats();
        return;
    }
    try {
        var sr = await fetch("/api/update-status");
        var sd = await sr.json();
        if (!sd.running) {
            localStorage.removeItem("update_running");
            localStorage.removeItem("update_item_ids");
            loadData(); loadStats();
            return;
        }
    } catch(e) {
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        loadData(); loadStats();
        return;
    }
    var pw = document.getElementById("progressWrap");
    var pl = document.getElementById("progressLabel");
    var fill = document.getElementById("progressFill");
    var cur = document.getElementById("currentItem");
    var ub = document.getElementById("btnUpdate");
    if (pw && pl) { pw.classList.add("active"); pl.textContent = "重新连接更新..."; }
    if (ub) { ub.disabled = true; ub.textContent = "更新中..."; }
    fill.style.width = "0%";
    var delay = parseFloat(document.getElementById("delaySelect").value) || 1.5;
    var es = new EventSource("/api/fetch?delay=" + delay + "&limit=300&discover=true&min_score=0&reconnect=true&item_ids=" + encodeURIComponent(savedItemIds));
    es.addEventListener("phase", function(e) { handleSSE(JSON.parse(e.data)); });
    es.addEventListener("item", function(e) { handleSSE(JSON.parse(e.data)); });
    es.addEventListener("progress", function(e) { handleSSE(JSON.parse(e.data)); });
    es.addEventListener("ratelimited", function(e) { handleSSE(JSON.parse(e.data)); es.close(); }); es.addEventListener("ping", function(e) {});
    es.onerror = function() {
        localStorage.removeItem("update_running");
        localStorage.removeItem("update_item_ids");
        es.close();
        if (pw) setTimeout(function() { pw.classList.remove("active"); }, 2000);
        if (ub) { ub.disabled = false; ub.textContent = "更新 Steam 数据"; }
        loadData(); loadStats();
    };
    loadData(); loadStats();
})();

</script>
